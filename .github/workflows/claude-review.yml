# Automated Claude Code review on every pull request targeting main.
# Requires the CLAUDE_CODE_OAUTH_TOKEN repository secret (generate it locally
# with `claude setup-token`). To make it a required (blocking) check, enable
# branch protection on main and mark the "review" check as required — but only
# after the secret exists, otherwise every merge is blocked.
name: Claude Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # TEMPORARY (debug): surface the Claude execution error while the
          # OAuth token setup is being sorted out. Remove once review passes.
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            This is a React + TypeScript + Vite project. Keep game logic pure and
            free of UI concerns, and expect strict Prettier/ESLint formatting.

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
